name: Deploy & E2E Test

on:
  push:
    branches:
      - development

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 1: Deploy to S3 (same as before)
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to S3
    runs-on: ubuntu-latest
    outputs:
      site-url: ${{ steps.set-url.outputs.url }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to S3 Bucket
        run: |
          aws s3 sync . s3://${{ secrets.AWS_S3_BUCKET }} \
            --delete \
            --acl public-read \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "README.md" \
            --exclude "node_modules/*" \
            --exclude "tests/*" \
            --exclude "playwright*" \
            --exclude "package*.json" \
            --exclude "test-results/*" \
            --exclude "playwright-report/*"

      - name: Export S3 website URL
        id: set-url
        run: echo "url=https://devops-learner.s3.us-east-2.amazonaws.com/Docker+website/index.html" >> "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2: E2E Tests (runs AFTER deploy, blocks merge if tests fail)
  # ──────────────────────────────────────────────────────────────────────────
  e2e-tests:
    name: E2E Functional Tests
    runs-on: ubuntu-latest
    needs: deploy          # Only runs if deploy succeeded
    # No continue-on-error → test failures BLOCK the pipeline

    env:
      BASE_URL: https://devops-learner.s3.us-east-2.amazonaws.com

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Playwright & Dependencies
        run: |
          npm ci
          npx playwright install chromium --with-deps

      - name: Wait for S3 propagation
        # S3 sometimes takes a few seconds to serve updated files
        run: sleep 10

      - name: Run E2E Tests
        id: run-tests
        run: npx playwright test
        # Failing tests will cause a non-zero exit code, failing this step
        # and blocking the overall workflow

      - name: Upload HTML Test Report
        uses: actions/upload-artifact@v4
        if: always()       # Upload even if tests failed (for debugging)
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 14

      - name: Upload JUnit XML Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.run_number }}
          path: test-results/
          retention-days: 14

      - name: Post test summary to PR / commit
        if: always()
        run: |
          echo "## 🧪 E2E Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.run-tests.outcome }}" == "success" ]; then
            echo "✅ All tests passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Some tests failed — download the HTML report artifact for details" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tested URL:** ${{ env.BASE_URL }}/Docker+website/index.html" >> $GITHUB_STEP_SUMMARY
          echo "**Run:** #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY