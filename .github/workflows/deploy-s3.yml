name: Deploy to S3

on:
  push:
    branches:
      - development

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }} # e.g., us-east-1

      - name: Deploy to S3 Bucket
        # Adjust the source directory if you only want to deploy a specific folder
        # For example: aws s3 sync "Docker website/" s3://${{ secrets.AWS_S3_BUCKET }} --delete
        run: |
          aws s3 sync . s3://${{ secrets.AWS_S3_BUCKET }} \
            --delete \
            --acl public-read \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "README.md"
          