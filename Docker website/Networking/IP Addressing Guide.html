                                    <p><strong>Definition:</strong> An IP address automatically assigned by a DHCP server.</p>
                                    <p><strong>When to Use:</strong> Laptops, smartphones, guest networks, large scale client networks.</p>
                                    <p><strong>Advantages:</strong> Automatic configuration, efficient IP utilization, reduces administrative overhead.</p>
                                </div>
                            </div>

                            <h3>Configuration Examples (Linux)</h3>
                            <h4>Static IP</h4>
                            <pre><code># Static IP configuration (netplan)
network:
  version: 2
  ethernets:
    eth0:
      addresses:
        - 192.168.1.100/24
      gateway4: 192.168.1.1
      nameservers:
        addresses: [8.8.8.8, 8.8.4.4]</code></pre>

                            <h4>Dynamic IP</h4>
                            <pre><code># DHCP configuration (netplan)
network:
  version: 2
  ethernets:
    eth0:
      dhcp4: true</code></pre>

                            <table>
                                <thead>
                                    <tr>
                                        <th>Feature</th>
                                        <th>Static IP</th>
                                        <th>Dynamic IP</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr><td>Configuration</td><td>Manual</td><td>Automatic (DHCP)</td></tr>
                                    <tr><td>Stability</td><td>Permanent</td><td>Temporary (lease-based)</td></tr>
                                    <tr><td>Use Case</td><td>Servers, network devices</td><td>Clients, mobile devices</td></tr>
                                    <tr><td>Management</td><td>High effort</td><td>Low (automated)</td></tr>
                                    <tr><td>Remote Access</td><td>Easy (fixed address)</td><td>Difficult (IP changes)</td></tr>
                                </tbody>
                            </table>
                        `
                    }

            dhcp: {
                title: "DHCP & DORA",
                icon: "zap",
                intro: "The protocol that automatically assigns IP information to devices.",
                sections: [
                    {
                        title: "What is DHCP?",
                        content: `
                            <div class="info-box">
                                <strong>Definition:</strong> A network protocol that automatically assigns IP addresses and configuration to devices.
                                <br><br>
                                <strong>Goal:</strong> Eliminate manual configuration, prevent conflicts, and centralize management.
                            </div>

                            <h3>DHCP Components</h3>
                            <ul>
                                <li><strong>DHCP Server:</strong> Manages the pool of available IPs.</li>
                                <li><strong>DHCP Client:</strong> The device requesting the IP.</li>
                                <li><strong>IP Address Pool:</strong> Range of available IPs (e.g., 100-200).</li>
                                <li><strong>Lease Duration:</strong> Time a device can use an IP before needing renewal.</li>
                            </ul>

                            <h3>DORA Process (How DHCP Works)</h3>
                            <div class="step-box">
                                <h4>1. DHCP Discover (Broadcast)</h4>
                                <p>Client searches for available DHCP servers. Source: <code>0.0.0.0</code>, Dest: <code>255.255.255.255</code>.</p>
                            </div>
                            <div class="step-box">
                                <h4>2. DHCP Offer (Unicast/Broadcast)</h4>
                                <p>Server offers an available IP with configuration details (mask, gateway, DNS).</p>
                            </div>
                            <div class="step-box">
                                <h4>3. DHCP Request (Broadcast)</h4>
                                <p>Client accepts the offer and requests the assigned IP.</p>
                            </div>
                            <div class="step-box">
                                <h4>4. DHCP Acknowledge (ACK)</h4>
                                <p>Server confirms the lease assignment. Client is now online.</p>
                            </div>

                            <div class="diagram">
                                Client                DHCP Server
                                  |-------Discover------>|
                                  |&lt;------Offer----------|
                                  |-------Request------->|
                                  |&lt;------ACK------------|
                            </div>

                            <h3>Lease Management</h3>
                            <ul>
                                <li><strong>T1 (50%):</strong> Client attempts to renew lease with original server (Unicast).</li>
                                <li><strong>T2 (87.5%):</strong> Client broadcasts request to any available DHCP server.</li>
                                <li><strong>Expiraiton (100%):</strong> Client must stop using the IP and restart DORA.</li>
                            </ul>

                            <h3>Useful Commands (Linux)</h3>
                            <pre><code># Release IP
sudo dhclient -r eth0

# Renew IP
sudo dhclient eth0

# View lease info
cat /var/lib/dhcp/dhclient.leases</code></pre>
                        `
                    }
                ]
            },
            subnetting: {
                title: "Subnetting & CIDR",
                icon: "split",
                intro: "Dividing large networks into smaller, more manageable sub-networks for performance and security.",
                sections: [
                    {
                        title: "Why Subnetting is Required",
                        content: `
                            <div class="info-box">
                                <strong>The Problem:</strong> A single large network suffers from massive broadcast traffic, security risks (no isolation), and IP address waste.
                                <br><br>
                                <strong>Benefits:</strong> Reduced broadcast traffic, improved security, better organization, and efficient IP utilization.
                            </div>

                            <h3>CIDR & Subnet Masks</h3>
                            <p><strong>CIDR Notation:</strong> <code>192.168.1.0/24</code> (24 network bits, 8 host bits).</p>
                            <div class="diagram">
                                IP: 192.168.1.100  (11000000.10101000.00000001.01100100)
                                Mask: 255.255.255.0 (11111111.11111111.11111111.00000000)
                                &lt;------- Network -------&gt; &lt;- Host -&gt;
                            </div>

                            <table>
                                <thead>
                                    <tr><th>CIDR</th><th>Mask</th><th>Usable Hosts</th><th>Use Case</th></tr>
                                </thead>
                                <tbody>
                                    <tr><td>/8</td><td>255.0.0.0</td><td>16.7M</td><td>Class A (Large)</td></tr>
                                    <tr><td>/16</td><td>255.255.0.0</td><td>65,534</td><td>Class B (Medium)</td></tr>
                                    <tr><td>/24</td><td>255.255.255.0</td><td>254</td><td>Standard LAN</td></tr>
                                    <tr><td>/30</td><td>255.255.255.252</td><td>2</td><td>Router Links</td></tr>
                                </tbody>
                            </table>

                            <h3>Calculation Formula</h3>
                            <div class="info-box">
                                <p><strong>Number of Usable Hosts = 2<sup>h</sup> - 2</strong></p>
                                <p><em>h</em> = host bits (zeros in mask). -2 for network and broadcast addresses.</p>
                            </div>

                            <h3>Subnetting Example: Splitting /24 into 4 subnets</h3>
                            <p>Need 2 bits (2<sup>2</sup> = 4). New mask is /26 (255.255.255.192).</p>
                            <table>
                                <thead>
                                    <tr><th>Subnet</th><th>Network Address</th><th>Usable Range</th><th>Broadcast</th></tr>
                                </thead>
                                <tbody>
                                    <tr><td>S1</td><td>192.168.1.0/26</td><td>.1 - .62</td><td>.63</td></tr>
                                    <tr><td>S2</td><td>192.168.1.64/26</td><td>.65 - .126</td><td>.127</td></tr>
                                    <tr><td>S3</td><td>192.168.1.128/26</td><td>.129 - .190</td><td>.191</td></tr>
                                    <tr><td>S4</td><td>192.168.1.192/26</td><td>.193 - .254</td><td>.255</td></tr>
                                </tbody>
                            </table>

                            <h3>DevOps Context: IP Addressing in Practice</h3>
                            <div class="space-y-4">
                                <div>
                                    <strong>AWS VPC:</strong> Uses CIDR like <code>10.0.0.0/16</code> split into public/private subnets.
                                    <pre><code>aws ec2 create-vpc --cidr-block 10.0.0.0/16</code></pre>
                                </div>
                                <div>
                                    <strong>Docker:</strong> Creates bridge networks with specific subnets.
                                    <pre><code>docker network create --subnet=172.18.0.0/16 my-net</code></pre>
                                </div>
                                <div>
                                    <strong>Kubernetes:</strong> Pods get IPs automatically from a cluster CIDR range (e.g., <code>10.244.0.0/16</code>).
                                </div>
                            </div>
                        `
                    }
                ]
            }
        };
