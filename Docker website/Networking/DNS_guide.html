                    {
                        title: "What is DNS?",
                        content: `
                            <p>DNS (Domain Name System) is a hierarchical, distributed naming system for computers, services, and resources connected to the internet or a private network. It translates domain names like <code>google.com</code> into IP addresses like <code>142.250.190.46</code>.</p>

                            <div class="comparison-grid">
                                <div class="comparison-card">
                                    <h4>Without DNS</h4>
                                    <p class="text-sm text-slate-400">You would need to memorize <code>142.250.190.46</code> to visit Google, <code>93.184.216.34</code> for example.com, and so on for every site.</p>
                                </div>
                                <div class="comparison-card">
                                    <h4>With DNS</h4>
                                    <p class="text-sm text-slate-400">You type <code>google.com</code> and DNS automatically resolves it to the correct IP address behind the scenes.</p>
                                </div>
                            </div>

                            <div class="info-box">
                                <strong>Key Properties of DNS</strong>
                                <ul>
                                    <li><strong>Distributed:</strong> No single server holds all records — zones are delegated across many servers worldwide.</li>
                                    <li><strong>Hierarchical:</strong> Organized as a tree: Root → TLD (.com, .org) → Domain → Subdomain.</li>
                                    <li><strong>Cached:</strong> Results are cached with a TTL (Time To Live) to reduce query load.</li>
                                    <li><strong>Protocol:</strong> Runs primarily over <strong>UDP port 53</strong> (fast), falls back to <strong>TCP port 53</strong> for large responses.</li>
                                </ul>
                            </div>
                        `

                        |
              ┌─────────┼─────────┐
             .com      .org      .net  ← TLD (Top-Level Domain) Servers
              |
          google.com              ← Authoritative Name Server
              |
         www.google.com           ← Final hostname (A/AAAA record)</code></pre>

                                </div>
                                <div class="comparison-card">
                                    <h4>🔄 Recursive Resolver</h4>
                                    <p class="text-sm text-slate-400">Your ISP's or configured DNS server (8.8.8.8, 1.1.1.1). It traverses the hierarchy on your behalf and caches results.</p>

                                    <h4>Recursive Query</h4>
                                    <p class="text-sm text-slate-400">The client asks the Recursive Resolver: <em>"Give me the final answer."</em> The resolver does all the work — querying root, TLD, and authoritative servers — and returns the final IP to the client.</p>
                                    <p class="text-xs text-blue-400 mt-2">Used by: Client → Recursive Resolver</p>
                                </div>
                                <div class="comparison-card">
                                    <h4>Iterative Query</h4>
                                    <p class="text-sm text-slate-400">The resolver asks each server: <em>"Do you know, or who should I ask next?"</em> Each server either answers or refers to the next server. The resolver does the walking.</p>
                                    <p class="text-xs text-orange-400 mt-2">Used by: Recursive Resolver → Root/TLD/Auth</p>

                                <pre class="bg-transparent border-0 p-0 text-slate-300"><code>Client → Recursive Resolver  [Recursive: "Find www.example.com for me"]
   ↓
Resolver → Root Server       [Iterative: "Who handles .com?"]
Root     → Resolver          [Referral: "Ask the .com TLD servers at X.X.X.X"]
   ↓
Resolver → TLD Server (.com) [Iterative: "Who handles example.com?"]
TLD      → Resolver          [Referral: "Ask auth ns1.example.com at Y.Y.Y.Y"]
   ↓
Resolver → Auth Server       [Iterative: "What is www.example.com?"]
Auth     → Resolver          [Answer: "93.184.216.34 (TTL 3600)"]
   ↓
Resolver → Client            [Final: "The IP is 93.184.216.34"]
Resolver caches result for TTL seconds.</code></pre>

                            <table>

3. /etc/hosts file            (static overrides, always checked first)

resolvectl statistics          # View cache stats
resolvectl flush-caches        # Clear all cached records

# macOS

sudo killall -HUP mDNSResponder

# Windows

                            <p>When you change a DNS record, the update does not appear instantly worldwide. Propagation is the time it takes for all resolvers around the world to expire their cached copy and fetch the new value.</p>

                            <div class="comparison-grid">
                                <div class="comparison-card">
                                    <h4>Why Propagation Takes Time</h4>
                                    <ul class="text-sm">
                                        <li>Resolvers cache the old record until its TTL expires</li>
                                        <li>Different users hit different resolvers with different caches</li>
                                        <li>Some ISP resolvers ignore TTLs and cache longer</li>
                                    </ul>
                                </div>
                                <div class="comparison-card">
                                    <h4>Typical Propagation Times</h4>
                                    <ul class="text-sm">
                                        <li>Low TTL (60s): < 5 minutes</li>
                                        <li>Standard TTL (3600s): 1–4 hours</li>
                                        <li>High TTL (86400s): up to 48 hours</li>

dig @8.8.8.8 example.com A         # Google DNS
dig @1.1.1.1 example.com A         # Cloudflare DNS
dig @9.9.9.9 example.com A         # Quad9 DNS
dig @208.67.222.222 example.com A  # OpenDNS

# Check with trace (follow full delegation)
dig +trace example.com</code></pre>

                            <p>DNSSEC adds cryptographic signatures to DNS records, allowing resolvers to verify that responses are authentic and have not been tampered with (prevents DNS cache poisoning).</p>

                                    <h4>How DNSSEC Works</h4>

                                    <h4>DNSSEC Record Types</h4>

                                        <li><strong>DS:</strong> Hash of child zone's key (in parent)</li>
                                        <li><strong>NSEC/NSEC3:</strong> Authenticated denial of existence</li>

                                    <tr><td><code>+cd</code></td><td>Disable DNSSEC checking — isolate DNSSEC failures</td></tr>

                            <div class="info-box" style="border-color: #a855f7; background: rgba(168,85,247,0.05);">
                                <strong style="color: #a855f7;">Interview Question Bank</strong>

                                <strong style="color: white; display:block; margin-top:1rem;">Q: What is the difference between a recursive and iterative DNS query?</strong>
                                <p style="margin-top:0.5rem;">Recursive: the client asks a resolver to do all the work and return the final answer. Iterative: the resolver asks each server in the hierarchy, gets a referral, then queries the next server itself.</p>

                                <strong style="color: white; display:block; margin-top:1rem;">Q: What is DNS caching and what is TTL?</strong>
                                <p style="margin-top:0.5rem;">DNS caching stores resolved records locally to avoid repeated queries. TTL (Time To Live) is a value in seconds set by the record owner that tells resolvers how long to cache the answer before re-querying.</p>

                                <strong style="color: white; display:block; margin-top:1rem;">Q: Can a CNAME point to another CNAME?</strong>
                                <p style="margin-top:0.5rem;">Yes, but it is discouraged (CNAME chains add latency). It is also not allowed at the zone apex. The chain must eventually resolve to an A/AAAA record.</p>

                                <strong style="color: white; display:block; margin-top:1rem;">Q: How does Kubernetes DNS work?</strong>
                                <p style="margin-top:0.5rem;">Kubernetes runs CoreDNS in the kube-system namespace. Every pod gets a resolv.conf pointing to CoreDNS's ClusterIP. Services are discoverable as <code>&lt;service&gt;.&lt;namespace&gt;.svc.cluster.local</code>.</p>

                                <strong style="color: white; display:block; margin-top:1rem;">Q: What is DNSSEC and why is it important?</strong>
                                <p style="margin-top:0.5rem;">DNSSEC cryptographically signs DNS records so resolvers can verify authenticity and detect tampering. It prevents cache poisoning attacks (like the Kaminsky attack) where attackers inject forged DNS responses.</p>

        const contentContainer = document.getElementById('content-container');
        let activeTab = 'fundamentals';

        function renderTabs() {
            navTabs.innerHTML = Object.entries(contentData).map(([id, data]) => `
                <button onclick="switchTab('${id}')"
                    id="tab-${id}"
                    class="tab-btn px-4 py-2 rounded-lg text-sm font-medium transition-all whitespace-nowrap flex items-center gap-2
                    ${activeTab === id
                    ? 'bg-blue-600/20 text-blue-400 border border-blue-500/30 shadow-lg shadow-blue-500/20'
                    : 'text-slate-400 hover:text-white hover:bg-slate-800 border border-transparent'}">
                    <i data-lucide="${data.icon}" class="w-4 h-4"></i>
                    ${data.title}
                </button>
            `).join('');
            lucide.createIcons();
        }

        function switchTab(tabId) {
            if (activeTab === tabId) return;
            activeTab = tabId;
            renderTabs();
            renderContent();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderContent() {
            const data = contentData[activeTab];
            let html = `
                <div class="fade-in">
                    <div class="mb-8">
                        <h1 class="text-3xl md:text-4xl font-extrabold text-white mb-3 tracking-tight">${data.title}</h1>
                        <p class="text-lg text-slate-400 leading-relaxed">${data.intro}</p>
                    </div>
            `;

            data.sections.forEach(section => {
                html += `
                    <section class="space-y-6">
                        ${section.title ? `<h2 class="text-2xl font-bold text-white mb-4">${section.title}</h2>` : ''}
                        <div class="prose prose-invert max-w-none">
                            ${section.content}
                        </div>
                    </section>
                `;
            });

            html += `</div>`;
            contentContainer.innerHTML = html;
            lucide.createIcons();
        }

        // Back-to-top visibility
        const backToTopBtn = document.querySelector('.back-to-top');
        backToTopBtn.style.opacity = '0';
        backToTopBtn.style.pointerEvents = 'none';

        window.addEventListener('scroll', () => {
            if (window.scrollY > 500) {
                backToTopBtn.style.opacity = '1';
                backToTopBtn.style.pointerEvents = 'auto';
            } else {
                backToTopBtn.style.opacity = '0';
                backToTopBtn.style.pointerEvents = 'none';
            }
        });

        backToTopBtn.addEventListener('click', (e) => {
            e.preventDefault();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        renderTabs();
        renderContent();
