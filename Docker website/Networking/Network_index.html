                    { layer: 3, name: "Network", protocol: "IP, Routers", action: "Routing between networks" },
                    { layer: 2, name: "Data Link", protocol: "Ethernet, MAC, Switches", action: "Local network delivery" },
                    { layer: 1, name: "Physical", protocol: "Cables, Wi-Fi, signals", action: "Electrical/radio signals" }
                ]
            },
            cheatsheet: {
                title: "Command Cheat Sheet",
                icon: "terminal",
                intro: "Essential Linux networking commands for DevOps troubleshooting and diagnostics.",
                categories: [
                    {
                        name: "Network Interface Management",
                        commands: [
                            { cmd: "ip addr show", desc: "Display all network interfaces" },
                            { cmd: "ip link show up", desc: "Show only active interfaces" },
                            { cmd: "sudo ip link set eth0 up", desc: "Bring an interface up" },
                            { cmd: "sudo ip addr add 192.168.1.100/24 dev eth0", desc: "Assign a static IP address" }
                        ]
                    },
                    {
                        name: "Connectivity Testing",
                        commands: [
                            { cmd: "ping google.com", desc: "Test connectivity to a host" },
                            { cmd: "ping -c 4 8.8.8.8", desc: "Send 4 packets and stop" },
                            { cmd: "traceroute google.com", desc: "Trace the route to a host" },
                            { cmd: "nc -zv example.com 22", desc: "Check if a port is open (Netcat)" }
                        ]
                    },
                    {
                        name: "DNS and Name Resolution",
                        commands: [
                            { cmd: "nslookup google.com", desc: "Query DNS for a domain" },
                            { cmd: "dig google.com", desc: "Advanced DNS lookup" },
                            { cmd: "dig google.com +short", desc: "Get just the IP address" },
                            { cmd: "dig -x 8.8.8.8", desc: "Reverse DNS lookup" }
                        ]
                    },
                    {
                        name: "Routing",
                        commands: [
                            { cmd: "ip route show", desc: "Display routing table" },
                            { cmd: "ip route show default", desc: "Show default gateway" },
                            { cmd: "sudo ip route add 10.0.0.0/24 via 192.168.1.1", desc: "Add a static route" },
                            { cmd: "sudo ip route del 10.0.0.0/24", desc: "Delete a route" }
                        ]
                    },
                    {
                        name: "Port and Socket Information",
                        commands: [
                            { cmd: "ss -tuln", desc: "Show all open ports (TCP/UDP, listening)" },
                            { cmd: "sudo ss -tulpn | grep :80", desc: "Show which process is using port 80" },
                            { cmd: "sudo lsof -i :80", desc: "List processes using port 80" },
                            { cmd: "ss -tan", desc: "Display all active connections" }
                        ]
                    },
                    {
                        name: "Firewall (iptables)",
                        commands: [
                            { cmd: "sudo iptables -L -v -n", desc: "List all firewall rules" },
                            { cmd: "sudo iptables -A INPUT -p tcp --dport 22 -j ACCEPT", desc: "Allow incoming SSH" },
                            { cmd: "sudo iptables -A INPUT -s 192.168.1.50 -j DROP", desc: "Block an IP address" },
                            { cmd: "sudo iptables -F", desc: "Flush all rules (use carefully!)" }
                        ]
                    },
                    {
                        name: "Network Performance",
                        commands: [
                            { cmd: "iftop", desc: "Real-time bandwidth by connection" },
                            { cmd: "iperf3 -s", desc: "Start iperf server" },
                            { cmd: "sudo tcpdump -i eth0", desc: "Capture network traffic on eth0" },
                            { cmd: "sudo tcpdump -i eth0 port 80", desc: "Capture HTTP traffic only" }
                        ]
                    },
                    {
                        name: "Docker Networking",
                        commands: [
                            { cmd: "docker network ls", desc: "List Docker networks" },
                            { cmd: "docker network inspect bridge", desc: "Inspect a network" },
                            { cmd: "docker network create my-network", desc: "Create a custom network" },
                            { cmd: "docker network connect my-network container", desc: "Connect container to network" }
                        ]
                    },
                    {
                        name: "Kubernetes Networking",
                        commands: [
                            { cmd: "kubectl get svc", desc: "List services" },
                            { cmd: "kubectl describe svc my-service", desc: "Describe a service" },
                            { cmd: "kubectl port-forward pod/my-pod 8080:80", desc: "Port-forward to a pod" },
                            { cmd: "kubectl get pods -o wide", desc: "Get pod IPs" }
                        ]
                    }
                ]
            }
        };

        let currentTab = 'intro';
        let currentStepIndex = -1;

        function startProcess() {
            const startBtn = document.getElementById('journey-start-btn');
            const nextBtn = document.getElementById('journey-next-btn');
            startBtn.disabled = true;
            nextBtn.disabled = false;
            currentStepIndex = 0;
            updateJourneyUI();
        }

        function nextStep() {
            const steps = contentData.journey.steps;
            if (currentStepIndex < steps.length - 1) {
                currentStepIndex++;
                updateJourneyUI();
            } else {
                finishProcess();
            }
        }

        function prevStep() {
            if (currentStepIndex > 0) {
                currentStepIndex--;
                updateJourneyUI();
            }
        }

        function jumpToStep(index) {
            const startBtn = document.getElementById('journey-start-btn');
            if (startBtn && startBtn.disabled) {
                currentStepIndex = index;
                updateJourneyUI();
            }
        }

        function finishProcess() {
            const detailTitleEl = document.getElementById('journey-detail-title');
            const detailContentEl = document.getElementById('journey-detail-content');
            const nextBtn = document.getElementById('journey-next-btn');
            const prevBtn = document.getElementById('journey-prev-btn');
            const startBtn = document.getElementById('journey-start-btn');

            detailTitleEl.innerText = "Connection Closed";
            detailContentEl.innerHTML = "<p class='mb-4'>The page is fully rendered. The <strong>TCP connection</strong> is kept alive (persistent connection) for a short time in case you initiate another search, allowing for faster subsequent requests without repeating the handshake.</p><p class='mb-4'>When idle timeout is reached (or explicitly closed), the connection is cleanly terminated via a <strong>TCP FIN exchange</strong>.</p><p class='mt-6 p-4 bg-blue-950/30 border border-blue-500/20 rounded-xl text-blue-300 italic'><strong>Round trip complete.</strong> The browser maintains its caches and rendered DOM for optimal performance.</p>";

            nextBtn.disabled = true;
            prevBtn.disabled = false;
            startBtn.disabled = false;
            startBtn.innerHTML = '<i data-lucide="refresh-cw" class="w-4 h-4"></i> Restart Request';
            currentStepIndex = contentData.journey.steps.length;

            document.querySelectorAll('.step-item').forEach(el => el.classList.remove('active'));
            lucide.createIcons();
        }

        function updateJourneyUI() {
            const nextBtn = document.getElementById('journey-next-btn');
            const prevBtn = document.getElementById('journey-prev-btn');
            const detailTitleEl = document.getElementById('journey-detail-title');
            const detailContentEl = document.getElementById('journey-detail-content');
            const steps = contentData.journey.steps;

            prevBtn.disabled = currentStepIndex === 0;
            nextBtn.disabled = false;
            nextBtn.innerHTML = currentStepIndex === steps.length - 1 ? 'Finish Process <i data-lucide="check" class="w-4 h-4"></i>' : 'Next Step <i data-lucide="chevron-right" class="w-4 h-4"></i>';

            document.querySelectorAll('.step-item').forEach((el, index) => {
                el.classList.remove('active');
                if (index <= currentStepIndex) {
                    el.classList.add('completed');
                } else {
                    el.classList.remove('completed');
                }
            });

            const activeStepEl = document.getElementById(`step-ui-${currentStepIndex}`);
            if (activeStepEl) {
                activeStepEl.classList.add('active');
                activeStepEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }

            const currentData = steps[currentStepIndex];
            if (currentData) {
                detailTitleEl.innerText = currentData.title;
                detailContentEl.innerHTML = currentData.detail;
                detailContentEl.scrollTop = 0;
            }
            lucide.createIcons();
        }

        function renderTabs() {
            const navContainer = document.getElementById('nav-tabs');
            navContainer.innerHTML = '';

            Object.keys(contentData).forEach(key => {
                const data = contentData[key];
                const isActive = currentTab === key;

                const btn = document.createElement('button');
                btn.className = `flex items-center space-x-2 px-4 py-3 text-sm font-semibold rounded-t-lg transition-colors whitespace-nowrap border-b-2 ${isActive
                    ? 'text-blue-400 bg-slate-800/50 border-blue-400'
                    : 'text-slate-400 hover:text-slate-100 hover:bg-slate-800/50 border-transparent'
                    }`;
                btn.onclick = () => {
                    currentTab = key;
                    renderTabs();
                    renderContent();
                };

                btn.innerHTML = `
                    <i data-lucide="${data.icon}" class="w-4 h-4"></i>
                    <span>${data.title}</span>
                `;
                navContainer.appendChild(btn);
            });
            lucide.createIcons();
        }

        function renderContent() {
            const container = document.getElementById('content-container');
            const data = contentData[currentTab];

            container.classList.remove('fade-in');
            void container.offsetWidth;
            container.classList.add('fade-in');

            let html = `
                <div class="mb-10 text-center max-w-3xl mx-auto">
                    <h2 class="text-3xl md:text-4xl font-bold text-white mb-4">${data.title}</h2>
                    <p class="text-lg text-slate-400">${data.intro}</p>
                </div>
            `;

            if (currentTab === 'intro') {
                html += renderIntro(data);
            } else if (currentTab === 'components') {
                html += renderComponents(data);
            } else if (currentTab === 'journey') {
                html += renderJourney(data);
            } else if (currentTab === 'cheatsheet') {
                html += renderCheatsheet(data);
            }

            container.innerHTML = html;
            lucide.createIcons();
        }

        function renderIntro(data) {
            let html = '<div class="space-y-12">';

            data.sections.forEach(section => {
                html += `
                    <div class="bg-slate-800 rounded-2xl border border-slate-700 p-8">
                        <h3 class="text-2xl font-bold text-white mb-6 flex items-center">
                            <i data-lucide="arrow-right" class="w-6 h-6 text-blue-400 mr-3"></i>
                            ${section.title}
                        </h3>
                        ${section.content}
                    </div>
                `;
            });

            if (data.guidesList) {
                html += `
                    <div class="bg-slate-800 rounded-2xl border border-slate-700 p-8">
                        <h3 class="text-2xl font-bold text-white mb-6 flex items-center">
                            <i data-lucide="book-open" class="w-6 h-6 text-blue-400 mr-3"></i>
                            In-Depth Guides
                        </h3>
                        <p class="text-slate-400 mb-6 font-medium">Explore specialized, practical deep-dives into fundamental networking topics.</p>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                `;
                data.guidesList.forEach(guide => {
                    html += `
                        <div class="bg-slate-900 border ${guide.borderColor} rounded-2xl overflow-hidden hover:-translate-y-1 transition-transform duration-200 shadow-lg">
                            <div class="${guide.bgClass} px-6 pt-6 pb-4">
                                <div class="flex items-center gap-3 mb-3">
                                    <div class="p-2 ${guide.iconBgClass} rounded-lg">
                                        <i data-lucide="${guide.icon}" class="w-5 h-5 ${guide.iconColor}"></i>
                                    </div>
                                    <h3 class="font-bold text-white text-lg">${guide.title}</h3>
                                </div>
                                <p class="text-slate-400 text-sm leading-relaxed">${guide.desc}</p>
                            </div>
                            <div class="px-6 pb-5 pt-4">
                                <a href="${guide.url}" class="flex items-center justify-center gap-2 w-full py-2.5 rounded-xl ${guide.btnClass} text-white font-semibold text-sm transition-colors">
                                    <i data-lucide="external-link" class="w-4 h-4"></i> Open Guide
                                </a>
                                <p class="text-slate-500 text-xs mt-3 text-center">${guide.subtext}</p>
                            </div>
                        </div>
                    `;
                });
                html += `
                        </div>
                    </div>
                `;
            }

            html += '</div>';
            return html;
        }

        function renderComponents(data) {
            let html = '<div class="grid grid-cols-1 md:grid-cols-2 gap-6">';

            data.components.forEach(comp => {
                html += `
                    <div class="component-card bg-slate-800 rounded-xl border border-slate-700 p-6">
                        <div class="flex items-center space-x-3 mb-4">
                            <div class="p-3 bg-blue-900/50 rounded-lg">
                                <i data-lucide="${comp.icon}" class="w-6 h-6 text-blue-400"></i>
                            </div>
                            <h3 class="text-xl font-bold text-white">${comp.name}</h3>
                        </div>
                        <p class="text-slate-300 mb-4 leading-relaxed">${comp.definition}</p>
                `;

                if (comp.types) {
                    html += '<div class="mb-3"><h4 class="text-sm font-bold text-blue-400 mb-2">Types:</h4><ul class="space-y-1 text-sm text-slate-400">';
                    comp.types.forEach(t => html += `<li>• ${t}</li>`);
                    html += '</ul></div>';
                }

                if (comp.functions) {
                    html += '<div class="mb-3"><h4 class="text-sm font-bold text-blue-400 mb-2">Key Functions:</h4><ul class="space-y-1 text-sm text-slate-400">';
                    comp.functions.forEach(f => html += `<li>• ${f}</li>`);
                    html += '</ul></div>';
                }

                if (comp.records) {
                    html += '<div class="mb-3"><h4 class="text-sm font-bold text-blue-400 mb-2">DNS Record Types:</h4><ul class="space-y-1 text-sm text-slate-400">';
                    comp.records.forEach(r => html += `<li>• ${r}</li>`);
                    html += '</ul></div>';
                }

                if (comp.how) {
                    html += `<p class="text-sm text-slate-400 mb-3"><strong class="text-blue-400">How It Works:</strong> ${comp.how}</p>`;
                }

                if (comp.example) {
                    html += `<p class="text-sm text-slate-400 mb-3 italic"><strong class="text-green-400">Example:</strong> ${comp.example}</p>`;
                }

                if (comp.process) {
                    html += `<p class="text-sm text-slate-400 mb-3">${comp.process}</p>`;
                }

                html += `
                        <div class="mt-4 pt-4 border-t border-slate-700">
                            <p class="text-xs text-slate-500"><strong class="text-emerald-400">DevOps:</strong> ${comp.devops}</p>
                        </div>
                    </div>
                `;
            });

            html += '</div>';
            return html;
        }

        function renderJourney(data) {
            let html = `
                <div class="space-y-8">
                    <div class="bg-slate-800 border border-slate-700 rounded-2xl p-6 md:p-8 shadow-xl">
                        <!-- Browser Bar Emulator -->
                        <div class="bg-slate-900 border border-slate-700 rounded-xl p-3 flex gap-3 items-center mb-8">
                            <div class="flex gap-1.5 px-2">
                                <div class="w-3 h-3 rounded-full bg-red-500/50"></div>
                                <div class="w-3 h-3 rounded-full bg-yellow-500/50"></div>
                                <div class="w-3 h-3 rounded-full bg-green-500/50"></div>
                            </div>
                            <div class="flex-grow flex items-center bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-slate-400 text-sm">
                                <i data-lucide="lock" class="w-3.5 h-3.5 mr-2 text-emerald-500"></i>
                                <span>https://</span>
                                <input type="text" value="google.com" readonly class="bg-transparent border-none focus:ring-0 text-slate-200 ml-0.5 w-full outline-none">
                            </div>
                            <button id="journey-start-btn" onclick="startProcess()" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2.5 rounded-lg font-bold text-sm transition-all shadow-lg flex items-center gap-2">
                                <i data-lucide="zap" class="w-4 h-4"></i>
                                Initiate Request
                            </button>
                        </div>

                        <div class="flex flex-col lg:flex-row gap-8 min-h-[500px]">
                            <!-- Steps Side -->
                            <div class="lg:w-1/3 flex flex-col gap-4 overflow-y-auto max-h-[500px] pr-2 steps-list" id="journey-steps-list">
            `;

            data.steps.forEach((step, index) => {
                const badgeClass = step.type === 'outbound' ? 'text-amber-400 bg-amber-400/10' :
                    step.type === 'inbound' ? 'text-emerald-400 bg-emerald-400/10' : 'text-rose-400 bg-rose-400/10';

                const icon = step.type === 'outbound' ? 'arrow-up-right' :
                    step.type === 'inbound' ? 'arrow-down-left' : 'server';

                html += `
                    <div class="step-item type-${step.type} bg-slate-900/40 border border-slate-700/50 p-4 rounded-xl cursor-pointer hover:bg-slate-800/60 transition-all" 
                         id="step-ui-${index}" onclick="jumpToStep(${index})">
                        <div class="flex items-center justify-between mb-2">
                            <span class="text-[9px] font-bold px-2 py-0.5 rounded-full ${badgeClass} uppercase tracking-wider flex items-center gap-1">
                                <i data-lucide="${icon}" class="w-2.5 h-2.5"></i>
                                ${step.type}
                            </span>
                            <span class="text-[10px] text-slate-500 font-mono">Step ${index + 1}</span>
                        </div>
                        <strong class="text-white text-sm block mb-1">${step.title}</strong>
                        <p class="text-[11px] text-slate-400 leading-tight">${step.brief}</p>
                    </div>
                `;
            });

            html += `
                            </div>

                            <!-- Details Panel -->
                            <div class="lg:w-2/3 bg-slate-900 border border-slate-700 rounded-2xl p-8 flex flex-col shadow-inner">
                                <div class="flex items-center gap-3 mb-6 pb-6 border-b border-slate-800">
                                    <i data-lucide="info" class="w-6 h-6 text-blue-400"></i>
                                    <h3 id="journey-detail-title" class="text-2xl font-bold text-white">Awaiting Execution...</h3>
                                </div>
                                
                                <div class="flex-grow overflow-y-auto detail-content pr-4 text-slate-300 leading-relaxed" id="journey-detail-content">
                                    <p class="text-lg text-slate-400 italic">Click "Initiate Request" to begin the step-by-step breakdown.</p>
                                </div>

                                <div class="mt-8 pt-6 border-t border-slate-800 flex justify-between items-center">
                                    <button id="journey-prev-btn" onclick="prevStep()" disabled class="flex items-center gap-2 px-5 py-2.5 rounded-xl bg-slate-800 hover:bg-slate-700 text-slate-300 disabled:opacity-30 disabled:cursor-not-allowed transition-colors font-semibold text-sm">
                                        <i data-lucide="chevron-left" class="w-4 h-4"></i>
                                        Previous
                                    </button>
                                    <button id="journey-next-btn" onclick="nextStep()" disabled class="flex items-center gap-2 px-5 py-2.5 rounded-xl bg-blue-600 hover:bg-blue-500 text-white disabled:opacity-30 disabled:cursor-not-allowed transition-colors font-semibold text-sm">
                                        Next Step
                                        <i data-lucide="chevron-right" class="w-4 h-4"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- OSI Model Reference -->
                    <div class="bg-slate-800 rounded-2xl border border-slate-700 p-8">
                        <h3 class="text-2xl font-bold text-white mb-6">OSI Model Reference</h3>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left">
                                <thead class="bg-slate-900">
                                    <tr>
                                        <th class="px-4 py-3 text-blue-400 font-semibold">Layer</th>
                                        <th class="px-4 py-3 text-blue-400 font-semibold">Name</th>
                                        <th class="px-4 py-3 text-blue-400 font-semibold">Protocol/Device</th>
                                        <th class="px-4 py-3 text-blue-400 font-semibold">What Happens</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-slate-700">
            `;

            data.osiModel.forEach(layer => {
                html += `
                    <tr class="hover:bg-slate-700/50">
                        <td class="px-4 py-3 font-mono text-green-400">${layer.layer}</td>
                        <td class="px-4 py-3 text-white font-semibold">${layer.name}</td>
                        <td class="px-4 py-3 text-slate-300">${layer.protocol}</td>
                        <td class="px-4 py-3 text-slate-400">${layer.action}</td>
                    </tr>
                `;
            });

            html += `
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;

            // Reset state when rendering
            currentStepIndex = -1;

            return html;
        }

        function renderCheatsheet(data) {
            let html = '<div class="grid grid-cols-1 md:grid-cols-2 gap-6">';

            data.categories.forEach(cat => {
                html += `
                    <div class="bg-slate-800 p-6 rounded-xl border border-slate-700">
                        <h3 class="text-lg font-bold text-white border-b border-slate-700 pb-2 mb-4 flex items-center">
                            <i data-lucide="chevron-right" class="w-5 h-5 text-blue-400 mr-2"></i> ${cat.name}
                        </h3>
                        <div class="space-y-4">
                `;

                cat.commands.forEach(item => {
                    html += `
                        <div>
                            <div class="bg-slate-900 text-green-400 font-mono text-sm p-2 rounded-md mb-1 border border-slate-700">
                                <span class="text-slate-500 select-none">$ </span>${item.cmd}
                            </div>
                            <p class="text-sm text-slate-400 pl-1">${item.desc}</p>
                        </div>
                    `;
                });

                html += '</div></div>';
            });

            html += '</div>';
            return html;
        }

        renderTabs();
        renderContent();
    </script>

    <script src="../assets/script.js"></script>
</body>

</html>
