<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git Learning Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] } } } }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../assets/styles.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .tech-card {
            border-left: 4px solid #3b82f6;
        }

        .analogy-card {
            border-left: 4px solid #10b981;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="min-h-screen bg-slate-900 text-slate-100 flex flex-col">

    <!-- Header -->
    <header class="bg-slate-950 border-b border-slate-800 text-white shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <i data-lucide="git-merge" class="w-8 h-8 text-blue-400"></i>
                <h1 class="text-2xl font-bold tracking-tight">Git <span class="text-slate-400 font-light">&</span> The
                    Warehouse</h1>
            </div>
            <p class="hidden sm:block text-sm text-slate-400">Concept to Command line</p>
        </div>
    </header>

    <!-- Navigation Tabs -->
    <div class="bg-slate-900 border-b border-slate-800 sticky top-[68px] z-40 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <nav class="flex space-x-2 md:space-x-6 overflow-x-auto py-3 no-scrollbar" id="nav-tabs">
                <!-- Tabs generated by JS -->
            </nav>
        </div>
    </div>

    <!-- Main Content Area -->
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        <div id="content-container" class="fade-in">
            <!-- Content injected by JS -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-slate-950 border-t border-slate-800 text-slate-500 py-6 text-center text-sm">
        <p>Git Learning Hub · DevOps Learning Hub · <a href="../index.html" class="text-blue-400 hover:underline">← Back
                to Hub</a></p>
    </footer>

    <script>
        // Data Structure for the Content
        const contentData = {
            vcs: {
                title: "Version Control Systems (VCS)",
                icon: "history",
                intro: "Before learning Git, we must understand the problem it solves. Version Control is a system that records changes to a file or set of files over time.",
                sections: [
                    {
                        techTitle: "The Requirement for VCS",
                        techText: "Without VCS, developers make copies of folders (e.g., project_v1, project_final). This leads to lost work and impossible collaboration. VCS provides a strict timeline and the ability to revert mistakes.",
                        analogyTitle: "The Farm's Record Book",
                        analogyText: "Imagine running a massive farm with 50 workers. Without a ledger, you don't know who planted what, when, or which fertilizer they used. VCS is the Master Ledger. It records every seed planted and who did it.",
                        techIcon: "file-code",
                        analogyIcon: "book-open",
                        commands: ["git init", "git clone <url>"]
                    },
                    {
                        techTitle: "Distributed VCS (Git)",
                        techText: "Git is Distributed. Every developer fully clones the entire repository (history and all) to their local machine. You can work completely offline, and it's highly resilient to server crashes.",
                        analogyTitle: "Distributed Warehouses",
                        analogyText: "Every farmer has an exact miniature replica of the main city silo on their own farm. You work locally all day, and later sync your personal silo with the city's main silo.",
                        techIcon: "network",
                        analogyIcon: "warehouse",
                        commands: ["git config --global user.name 'Your Name'", "git config --global user.email 'you@example.com'"]
                    }
                ]
            },
            workflow: {
                title: "The Git Workflow",
                icon: "git-branch",
                intro: "Git has three main states: Modified, Staged, and Committed. This workflow is the core loop of day-to-day development.",
                visualizer: 'workflow',
                sections: [
                    {
                        techTitle: "1. Working Directory (Modified)",
                        techText: "This is your active local file system. You are writing code. Git sees these files have changed, but they are not yet tracked for the next save.",
                        analogyTitle: "1. The Farm Field",
                        analogyText: "You are out in the field pulling carrots out of the dirt and tossing them into a pile. The warehouse manager doesn't care about this messy pile yet.",
                        techIcon: "laptop",
                        analogyIcon: "tractor",
                        commands: ["git status", "git diff"]
                    },
                    {
                        techTitle: "2. Staging Area (Index)",
                        techText: "You move specific files into the Staging Area. You are building the exact snapshot of what your next commit will look like.",
                        analogyTitle: "2. The Loading Dock (Boxes)",
                        analogyText: "You take the carrots, wash them, and pack them neatly into a wooden crate on the loading dock. You are preparing them for official storage.",
                        techIcon: "box-select",
                        analogyIcon: "package",
                        commands: ["git add index.html", "git add ."]
                    },
                    {
                        techTitle: "3. Local Repository (Committed)",
                        techText: "You permanently store the snapshot from your staging area into your local Git database. It gets a unique ID (hash).",
                        analogyTitle: "3. The Local Warehouse",
                        analogyText: "You take the sealed crate, stamp it with a label ('Fresh Carrots'), and put it on a shelf in your personal farm warehouse.",
                        techIcon: "database",
                        analogyIcon: "store",
                        commands: ["git commit -m 'Add new login button'", "git log"]
                    },
                    {
                        techTitle: "4. Remote Repository (Push)",
                        techText: "You upload your local repository's commits to a remote server (like GitHub) so others can access them.",
                        analogyTitle: "4. The Global Distribution Center",
                        analogyText: "You load your local crates onto a truck and drive them to the massive distribution center in the city, making them available to the world.",
                        techIcon: "cloud-upload",
                        analogyIcon: "globe",
                        commands: ["git push origin main", "git pull origin main"]
                    }
                ]
            },
            branching: {
                title: "Branching",
                icon: "git-commit",
                intro: "Branching means diverging from the main line of development to work on a feature safely without breaking production code.",
                visualizer: 'branching',
                sections: [
                    {
                        techTitle: "The 'main' Branch",
                        techText: "This is typically the stable, production-ready version of your code. You do not experiment directly here.",
                        analogyTitle: "The Main Harvest Line",
                        analogyText: "These are the apples you sell to the supermarket. You absolutely cannot test dangerous new pesticides on this line, or you go bankrupt.",
                        techIcon: "shield-check",
                        analogyIcon: "award",
                        commands: ["git branch", "git checkout main"]
                    },
                    {
                        techTitle: "Creating a Branch",
                        techText: "Git creates a lightweight movable pointer to your current commit. It creates an isolated sandbox identical to 'main' at that exact moment.",
                        analogyTitle: "Renting a Neighboring Plot",
                        analogyText: "You clone your entire apple orchard onto an empty plot of land next door. You can try experimental pesticides here. If the trees die, the main harvest is safe.",
                        techIcon: "split",
                        analogyIcon: "sprout",
                        commands: ["git branch feature-login", "git checkout feature-login", "# Or do both at once:", "git checkout -b feature-login"]
                    }
                ]
            },
            merging: {
                title: "Merging & Conflicts",
                icon: "git-pull-request",
                intro: "Once isolated work is complete, you bring those changes back into the main project. Sometimes, this causes collisions.",
                visualizer: 'merging',
                sections: [
                    {
                        techTitle: "A Clean Merge",
                        techText: "If you edited a file in your branch, and nobody else touched that file in 'main', Git automatically combines the history. Fast and seamless.",
                        analogyTitle: "Merging the Harvest",
                        analogyText: "Your experimental apples grew perfectly. You bring the crates from the neighboring plot and simply stack them on an empty shelf in the main warehouse.",
                        techIcon: "check-circle-2",
                        analogyIcon: "check-square",
                        commands: ["git checkout main", "git merge feature-login"]
                    },
                    {
                        techTitle: "A Merge Conflict",
                        techText: "If Developer A and Developer B change the exact same line of code in the exact same file on different branches, Git halts the merge. It cannot guess which to keep.",
                        analogyTitle: "The Collision in the Warehouse",
                        analogyText: "Worker A tries to put apples on Shelf 5. Worker B tries to put oranges on the exact same spot on Shelf 5. The manager yells, 'STOP! You two figure this out!'",
                        techIcon: "alert-triangle",
                        analogyIcon: "zap",
                        commands: ["# Git will output:", "CONFLICT (content): Merge conflict in index.html", "Automatic merge failed; fix conflicts and then commit the result."]
                    },
                    {
                        techTitle: "Resolving the Conflict",
                        techText: "The developer must open the conflicting file, locate the conflict markers (<<<<<<<), manually edit the code to the desired final state, and make a new commit.",
                        analogyTitle: "Sorting the Crates",
                        analogyText: "Worker A and Worker B look at Shelf 5. They agree to put apples on the left and oranges on the right. They repack the boxes, and the manager approves.",
                        techIcon: "wrench",
                        analogyIcon: "hammer",
                        commands: ["# 1. Edit the file manually", "# 2. Add the resolved file:", "git add index.html", "# 3. Finalize the merge:", "git commit -m 'Resolve merge conflict'"]
                    }
                ]
            },
            cheatsheet: {
                title: "Git Command Cheat Sheet",
                icon: "terminal-square",
                intro: "Your quick-reference guide for the terminal.",
                isCheatSheet: true,
                categories: [
                    {
                        name: "1. Setup & Initialization",
                        items: [
                            { cmd: "git init", desc: "Initialize a local Git repository in the current folder." },
                            { cmd: "git clone <url>", desc: "Download a project and its entire version history." },
                            { cmd: "git config --global user.name 'Name'", desc: "Set the name attached to your commits." }
                        ]
                    },
                    {
                        name: "2. The Daily Workflow",
                        items: [
                            { cmd: "git status", desc: "List which files are staged, unstaged, and untracked." },
                            { cmd: "git diff", desc: "Show exact line-by-line changes not yet staged." },
                            { cmd: "git add <file>", desc: "Snapshot the file in preparation for versioning." },
                            { cmd: "git commit -m 'Message'", desc: "Record the snapshot permanently in version history." }
                        ]
                    },
                    {
                        name: "3. Branching",
                        items: [
                            { cmd: "git branch", desc: "List all local branches in the current repository." },
                            { cmd: "git branch <branch-name>", desc: "Create a new branch." },
                            { cmd: "git checkout <branch-name>", desc: "Switch to the specified branch." },
                            { cmd: "git checkout -b <branch-name>", desc: "Create a new branch AND switch to it immediately." }
                        ]
                    },
                    {
                        name: "4. Merging & History",
                        items: [
                            { cmd: "git merge <branch-name>", desc: "Combine the specified branch's history into the current branch." },
                            { cmd: "git log", desc: "List version history for the current branch." },
                            { cmd: "git log --oneline", desc: "Show history in a compact, single-line format." }
                        ]
                    },
                    {
                        name: "5. Remote Repositories",
                        items: [
                            { cmd: "git push origin <branch>", desc: "Upload local branch commits to the remote repository." },
                            { cmd: "git pull origin <branch>", desc: "Fetch and download content from the remote and immediately update local repo." },
                            { cmd: "git remote -v", desc: "Show the URLs of remote repositories attached to your local repo." }
                        ]
                    }
                ]
            }
        };

        let currentTab = 'vcs';

        function renderTabs() {
            const navContainer = document.getElementById('nav-tabs');
            navContainer.innerHTML = '';

            Object.keys(contentData).forEach(key => {
                const data = contentData[key];
                const isActive = currentTab === key;

                const btn = document.createElement('button');
                btn.className = `flex items-center space-x-2 px-4 py-3 text-sm font-semibold rounded-t-lg transition-colors whitespace-nowrap border-b-2 ${isActive
                    ? 'text-blue-400 bg-slate-800/50 border-blue-400'
                    : 'text-slate-400 hover:text-slate-100 hover:bg-slate-800/50 border-transparent'
                    }`;
                btn.onclick = () => {
                    currentTab = key;
                    renderTabs();
                    renderContent();
                };

                btn.innerHTML = `
                    <i data-lucide="${data.icon}" class="w-4 h-4"></i>
                    <span>${data.title}</span>
                `;
                navContainer.appendChild(btn);
            });
            lucide.createIcons();
        }

        function renderCodeBlock(commands) {
            if (!commands || commands.length === 0) return '';

            let cmdHtml = commands.map(cmd => {
                if (cmd.startsWith('#')) return `<div class="text-slate-500">${cmd}</div>`;
                return `<div><span class="text-emerald-500 select-none">$ </span><span class="text-slate-200">${cmd}</span></div>`;
            }).join('');

            return `
                <div class="mt-5 rounded-lg overflow-hidden border border-slate-700 shadow-sm bg-slate-900">
                    <div class="bg-slate-800 px-4 py-1.5 flex items-center space-x-2">
                        <div class="w-2.5 h-2.5 rounded-full bg-rose-500"></div>
                        <div class="w-2.5 h-2.5 rounded-full bg-amber-500"></div>
                        <div class="w-2.5 h-2.5 rounded-full bg-emerald-500"></div>
                        <span class="text-xs text-slate-400 font-mono ml-4">Terminal</span>
                    </div>
                    <div class="p-4 font-mono text-sm leading-relaxed overflow-x-auto">
                        ${cmdHtml}
                    </div>
                </div>
            `;
        }

        function renderVisualizer(type) {
            if (type === 'workflow') {
                return `
                    <div class="mb-10 p-6 bg-slate-900 text-white rounded-xl shadow-inner overflow-x-auto border border-slate-700">
                        <div class="flex flex-col md:flex-row items-center justify-between min-w-[600px] space-y-4 md:space-y-0">
                            <div class="flex flex-col items-center"><div class="w-16 h-16 rounded-full bg-slate-800 border-2 border-slate-600 flex items-center justify-center mb-2"><i data-lucide="laptop" class="text-slate-400"></i></div><span class="font-medium text-sm">Working Dir</span></div>
                            <div class="flex-1 flex flex-col items-center justify-center px-2"><span class="text-xs text-blue-400 font-mono mb-1">git add</span><div class="w-full h-0.5 bg-slate-700 relative"><div class="absolute right-0 top-1/2 transform -translate-y-1/2 w-2 h-2 border-t border-r border-slate-700 rotate-45"></div></div></div>
                            <div class="flex flex-col items-center"><div class="w-16 h-16 rounded-full bg-slate-800 border-2 border-blue-500 flex items-center justify-center mb-2"><i data-lucide="box-select" class="text-blue-400"></i></div><span class="font-medium text-sm">Staging Area</span></div>
                            <div class="flex-1 flex flex-col items-center justify-center px-2"><span class="text-xs text-green-400 font-mono mb-1">git commit</span><div class="w-full h-0.5 bg-slate-700 relative"><div class="absolute right-0 top-1/2 transform -translate-y-1/2 w-2 h-2 border-t border-r border-slate-700 rotate-45"></div></div></div>
                            <div class="flex flex-col items-center"><div class="w-16 h-16 rounded-full bg-slate-800 border-2 border-green-500 flex items-center justify-center mb-2"><i data-lucide="database" class="text-green-400"></i></div><span class="font-medium text-sm">Local Repo</span></div>
                            <div class="flex-1 flex flex-col items-center justify-center px-2"><span class="text-xs text-purple-400 font-mono mb-1">git push</span><div class="w-full h-0.5 bg-slate-700 relative"><div class="absolute right-0 top-1/2 transform -translate-y-1/2 w-2 h-2 border-t border-r border-slate-700 rotate-45"></div></div></div>
                            <div class="flex flex-col items-center"><div class="w-16 h-16 rounded-full bg-slate-800 border-2 border-purple-500 flex items-center justify-center mb-2"><i data-lucide="cloud" class="text-purple-400"></i></div><span class="font-medium text-sm">Remote Repo</span></div>
                        </div>
                    </div>`;
            } else if (type === 'branching') {
                return `
                    <div class="mb-10 p-6 bg-slate-900 rounded-xl shadow-inner border border-slate-700">
                        <h3 class="text-sm font-mono text-slate-400 mb-4 text-center">Visualizing: git branch feature-login</h3>
                        <svg viewBox="0 0 500 160" class="w-full h-auto max-h-48 drop-shadow-md">
                            <!-- Main line -->
                            <path d="M 50 110 L 450 110" stroke="#3b82f6" stroke-width="4" fill="none" />
                            <!-- Feature line -->
                            <path d="M 150 110 C 190 110 190 40 230 40 L 400 40" stroke="#10b981" stroke-width="4" fill="none" />
                            
                            <!-- Commits Main -->
                            <circle cx="50" cy="110" r="10" fill="#1e293b" stroke="#3b82f6" stroke-width="4"/>
                            <circle cx="150" cy="110" r="10" fill="#1e293b" stroke="#3b82f6" stroke-width="4"/>
                            <circle cx="280" cy="110" r="10" fill="#1e293b" stroke="#3b82f6" stroke-width="4"/>
                            <circle cx="410" cy="110" r="10" fill="#1e293b" stroke="#3b82f6" stroke-width="4"/>
                            
                            <!-- Commits Feature -->
                            <circle cx="230" cy="40" r="10" fill="#1e293b" stroke="#10b981" stroke-width="4"/>
                            <circle cx="320" cy="40" r="10" fill="#1e293b" stroke="#10b981" stroke-width="4"/>
                            <circle cx="400" cy="40" r="10" fill="#1e293b" stroke="#10b981" stroke-width="4"/>
                            
                            <!-- Labels -->
                            <text x="50" cy="135" fill="#94a3b8" font-size="12" font-family="monospace" text-anchor="middle">v1.0</text>
                            <text x="450" cy="130" fill="#60a5fa" font-size="14" font-family="monospace" font-weight="bold">main</text>
                            <text x="400" cy="20" fill="#34d399" font-size="14" font-family="monospace" font-weight="bold">feature-login</text>
                        </svg>
                    </div>`;
            } else if (type === 'merging') {
                return `
                    <div class="mb-10 p-6 bg-slate-900 rounded-xl shadow-inner border border-slate-700">
                        <h3 class="text-sm font-mono text-slate-400 mb-4 text-center">Visualizing: git merge feature-login</h3>
                        <svg viewBox="0 0 500 160" class="w-full h-auto max-h-48 drop-shadow-md">
                            <!-- Main line -->
                            <path d="M 50 110 L 450 110" stroke="#3b82f6" stroke-width="4" fill="none" />
                            <!-- Feature line (diverge and merge) -->
                            <path d="M 150 110 C 180 110 180 40 220 40 L 300 40 C 340 40 340 110 380 110" stroke="#10b981" stroke-width="4" fill="none" stroke-dasharray="5,5" />
                            <path d="M 150 110 C 180 110 180 40 220 40 L 300 40" stroke="#10b981" stroke-width="4" fill="none" />
                            
                            <!-- Commits -->
                            <circle cx="50" cy="110" r="10" fill="#1e293b" stroke="#3b82f6" stroke-width="4"/>
                            <circle cx="150" cy="110" r="10" fill="#1e293b" stroke="#3b82f6" stroke-width="4"/>
                            
                            <circle cx="220" cy="40" r="10" fill="#1e293b" stroke="#10b981" stroke-width="4"/>
                            <circle cx="300" cy="40" r="10" fill="#1e293b" stroke="#10b981" stroke-width="4"/>
                            
                            <!-- Merge Commit -->
                            <circle cx="380" cy="110" r="12" fill="#3b82f6" stroke="#f59e0b" stroke-width="4"/>
                            
                            <!-- Labels -->
                            <text x="450" cy="130" fill="#60a5fa" font-size="14" font-family="monospace" font-weight="bold">main</text>
                            <text x="300" cy="20" fill="#34d399" font-size="14" font-family="monospace" font-weight="bold">feature-login</text>
                            <text x="380" cy="140" fill="#f59e0b" font-size="12" font-family="monospace" font-weight="bold" text-anchor="middle">Merge Commit</text>
                        </svg>
                    </div>`;
            }
            return '';
        }

        function renderCheatSheet(data) {
            let html = `
                <div class="mb-10 text-center max-w-3xl mx-auto">
                    <h2 class="text-3xl md:text-4xl font-bold text-white mb-4">${data.title}</h2>
                    <p class="text-lg text-slate-400">${data.intro}</p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            `;

            data.categories.forEach(cat => {
                html += `
                    <div class="bg-slate-800 p-6 rounded-xl border border-slate-700">
                        <h3 class="text-lg font-bold text-white border-b border-slate-700 pb-2 mb-4 flex items-center">
                            <i data-lucide="chevron-right" class="w-5 h-5 text-blue-400 mr-2"></i> ${cat.name}
                        </h3>
                        <div class="space-y-4">
                `;

                cat.items.forEach(item => {
                    html += `
                        <div>
                            <div class="bg-slate-900 text-green-400 font-mono text-sm p-2 rounded-md mb-1 border border-slate-700 flex justify-between group">
                                <span><span class="text-slate-500 select-none">$ </span>${item.cmd}</span>
                            </div>
                            <p class="text-sm text-slate-400 pl-1">${item.desc}</p>
                        </div>
                    `;
                });

                html += `</div></div>`;
            });

            html += `</div>`;
            return html;
        }

        function renderContent() {
            const container = document.getElementById('content-container');
            const data = contentData[currentTab];

            container.classList.remove('fade-in');
            void container.offsetWidth;
            container.classList.add('fade-in');

            if (data.isCheatSheet) {
                container.innerHTML = renderCheatSheet(data);
                lucide.createIcons();
                return;
            }

            let html = `
                <div class="mb-10 text-center max-w-3xl mx-auto">
                    <h2 class="text-3xl md:text-4xl font-bold text-white mb-4">${data.title}</h2>
                    <p class="text-lg text-slate-400">${data.intro}</p>
                </div>
            `;

            if (data.visualizer) {
                html += renderVisualizer(data.visualizer);
            }

            html += `<div class="space-y-8">`;

            data.sections.forEach(sec => {
                const terminalHtml = renderCodeBlock(sec.commands);

                html += `
                    <div class="bg-slate-800 rounded-2xl border border-slate-700 overflow-hidden">
                        <div class="grid grid-cols-1 md:grid-cols-2 divide-y md:divide-y-0 md:divide-x divide-slate-700">
                            
                            <!-- Technical Reality -->
                            <div class="p-6 md:p-8 tech-card bg-slate-900/50 flex flex-col h-full">
                                <div>
                                    <div class="flex items-center space-x-3 mb-4">
                                        <div class="p-2 bg-blue-900/50 rounded-lg text-blue-400">
                                            <i data-lucide="${sec.techIcon}"></i>
                                        </div>
                                        <h3 class="text-xl font-bold text-white">The Technical Reality</h3>
                                    </div>
                                    <h4 class="text-sm font-bold uppercase tracking-wider text-blue-400 mb-3">${sec.techTitle}</h4>
                                    <div class="text-slate-300 leading-relaxed text-sm md:text-base">
                                        ${sec.techText}
                                    </div>
                                </div>
                                <div class="mt-auto pt-4">
                                    ${terminalHtml}
                                </div>
                            </div>

                            <!-- The Analogy -->
                            <div class="p-6 md:p-8 analogy-card bg-emerald-950/20 flex flex-col h-full justify-center">
                                <div class="flex items-center space-x-3 mb-4">
                                    <div class="p-2 bg-emerald-900/50 rounded-lg text-emerald-400">
                                        <i data-lucide="${sec.analogyIcon}"></i>
                                    </div>
                                    <h3 class="text-xl font-bold text-white">The Analogy</h3>
                                </div>
                                <h4 class="text-sm font-bold uppercase tracking-wider text-emerald-400 mb-3">${sec.analogyTitle}</h4>
                                <div class="text-slate-300 leading-relaxed text-sm md:text-base italic">
                                    "${sec.analogyText}"
                                </div>
                            </div>

                        </div>
                    </div>
                `;
            });

            html += `</div>`;
            container.innerHTML = html;
            lucide.createIcons();
        }

        // Initialize
        renderTabs();
        renderContent();
    </script>

    <script src="../assets/script.js"></script>
</body>
